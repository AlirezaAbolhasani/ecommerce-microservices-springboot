# application.yml
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: ir.orcacode.ecommerceorderservice
  paths-to-match: /**
logging:
  file:
      name: logs/order.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss}[%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
spring:
  security:
    user:
      name: ${ADMIN_USERNAME:admin}
      password: ${ADMIN_PASSWORD:123}
      roles: ADMIN

management:
  endpoints:
    web:
      exposure:
        include: health,info